name: Release

# Build the plugin JAR and attach it to a GitHub Release when a version tag is pushed.
#   git tag v1.1.0 && git push origin v1.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -B clean package

      - name: Create release and attach JAR
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/EssentialsX-Dashboard-*.jar
